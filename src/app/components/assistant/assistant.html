<div
  class="min-h-screen flex items-center justify-center p-4 bg-linear-to-br from-slate-900 via-purple-900 to-purple-800"
>
  @defer (when userInteraction.hasInteracted()) {
    <app-background-music />
  } @placeholder {
    <span></span>
  }
  @defer (on interaction; on hover) {
    <app-settings class="fixed top-4 right-4 z-50" />
  } @placeholder {
    <button
    class="fixed top-4 right-4 z-50 w-10 h-10 rounded-full bg-gray-800/70 border border-purple-500/40 flex items-center justify-center text-purple-300 hover:text-white hover:bg-purple-700/50 transition-all hover:scale-110 shadow-lg"
  >
    ⚙️
  </button>
  }
  <div
    class="w-full max-w-5xl h-[85vh] bg-gray-950/90 backdrop-blur-2xl rounded-3xl shadow-2xl shadow-purple-500/30 border-2 border-purple-500/50 flex flex-col overflow-hidden"
  >
    <!-- Header -->
    <div
      class="bg-linear-to-r from-purple-600 via-purple-500 to-pink-500 p-6 flex items-center justify-between shadow-lg shadow-purple-500/40 shrink-0"
    >
      <div>
        <h1 class="text-base sm:text-2xl font-bold text-white flex items-center gap-2">
          <span>💬</span>Milos's Portfolio Assistant
        </h1>
        <p class="text-purple-100 text-sm mt-1">Powered by Angular 21 + Signals</p>
      </div>
    </div>

    <div
      #chatMessages
      class="flex-1 overflow-y-auto px-3 py-4 sm:px-6 md:px-8 sm:py-6 space-y-4 bg-gray-900/50 chat-messages min-h-0"
    >
      @for (message of messages(); track message.id) {
        <div
          class="flex animate-fadeIn"
          [class.justify-end]="message.role === 'user'"
          [class.justify-start]="message.role === 'assistant'"
        >
          <div
            class="max-w-[85%] sm:max-w-[70%] rounded-2xl px-4 sm:px-5 py-3 shadow-xl"
            [ngClass]="
              message.role === 'user'
                ? 'bg-linear-to-r from-purple-600 via-purple-500 to-pink-500 text-white shadow-purple-500/40'
                : 'bg-gray-800/90 text-gray-100 border border-purple-500/30 shadow-purple-500/20'
            "
          >
            <p
              class="text-sm sm:text-base leading-relaxed whitespace-pre-wrap wrap-break-word"
              [innerHTML]="message.content"
            ></p>

            <span class="text-xs opacity-60 mt-1 block">{{
              message.timestamp | date: 'HH:mm'
            }}</span>
          </div>
        </div>
      }

      @if (isLoading()) {
        <div class="flex justify-start">
          <div
            class="bg-gray-800/90 rounded-2xl px-5 py-3 border border-purple-500/30 shadow-xl shadow-purple-500/20"
          >
            <div class="flex gap-1">
              <span
                class="w-2 h-2 bg-purple-400 rounded-full animate-bounce shadow-lg shadow-purple-400/50"
              ></span>
              <span
                class="w-2 h-2 bg-purple-400 rounded-full animate-bounce shadow-lg shadow-purple-400/50"
                style="animation-delay: 0.2s"
              ></span>
              <span
                class="w-2 h-2 bg-purple-400 rounded-full animate-bounce shadow-lg shadow-purple-400/50"
                style="animation-delay: 0.4s"
              ></span>
            </div>
          </div>
        </div>
      }
    </div>

    <div
      class="px-3 py-4 sm:px-6 md:px-8 sm:py-6 bg-gray-900/60 border-t border-purple-500/30 shadow-inner shrink-0"
    >
      <div class="flex gap-2 sm:gap-3 items-center">
        <input
          type="text"
          [value]="userInput()"
          (input)="userInput.set($any($event.target).value)"
          (keydown)="onKeyPress($event)"
          [disabled]="isLoading()"
          placeholder="Type your message..."
          class="flex-1 bg-gray-800/70 border border-gray-600/50 rounded-full px-4 sm:px-5 py-3 sm:py-3.5 text-sm sm:text-base text-white placeholder-gray-400 focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-500/30 transition disabled:opacity-50 disabled:cursor-not-allowed shadow-lg min-w-0"
        />
        <button
          (click)="sendMessage()"
          [disabled]="!userInput().trim() || isLoading()"
          class="bg-linear-to-r from-purple-600 via-purple-500 to-pink-500 text-white px-4 sm:px-6 md:px-8 py-3.5 rounded-full text-sm sm:text-base font-bold transition-all hover:shadow-xl hover:shadow-purple-500/60 disabled:opacity-50 disabled:cursor-not-allowed hover:scale-105 active:scale-95 shadow-lg shadow-purple-500/50 shrink-0"
        >
          Send
        </button>
      </div>
      <div *ngIf="false" class="mt-3 text-center">
        <button
          (click)="resetChat()"
          class="text-purple-300 hover:text-purple-200 text-sm transition-all hover:scale-105"
        >
          🔄 Reset Chat
        </button>
      </div>
    </div>
  </div>
</div>
<app-version-display></app-version-display>
